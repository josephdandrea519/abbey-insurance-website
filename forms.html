<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Forms</title></head>
<body>
  <!--
    Shadow form registration file for Netlify Forms.
    Netlify post-processes THIS file to register both forms.
    The actual form pages (contact.html, quote.html) submit via fetch
    so they are never scanned for form definitions — preventing post-processing loops.
  -->

  <!-- Contact form -->
  <form name="contact" netlify netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="bot-field" />
    <input type="text"  name="first_name" />
    <input type="text"  name="last_name" />
    <input type="email" name="email" />
    <input type="tel"   name="phone" />
    <select name="subject"></select>
    <textarea name="message"></textarea>
  </form>

  <!-- Quote request form -->
  <form name="quote-request" netlify netlify-honeypot="bot-field" hidden>
